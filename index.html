<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国国民党海口一中党部官方网站</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            color: #333;
            line-height: 1.8;
        }
        
        .header {
            text-align: center;
            background: #003087;
            color: white;
            padding: 20px 0;
        }
        
        .flag {
            width: 180px;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 2.4rem;
            margin: 10px 0;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.95;
        }
        
        nav {
            background: #002266;
            padding: 12px 0;
            text-align: center;
        }
        
        nav a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-size: 1.1rem;
        }
        
        nav a:hover {
            color: #C9A227;
        }
        
        .main {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            min-height: 60vh;
        }
        
        .welcome {
            text-align: center;
            font-size: 1.25rem;
            margin-bottom: 40px;
            border-bottom: 2px solid #C9A227;
            padding-bottom: 25px;
        }
        
        h2 {
            color: #003087;
            border-left: 5px solid #C9A227;
            padding-left: 15px;
        }
        
        .announcement {
            background: #f9f9f9;
            padding: 20px;
            border-left: 4px solid #003087;
        }
        
        footer {
            text-align: center;
            padding: 25px;
            background: #002266;
            color: #ccc;
            font-size: 0.95rem;
        }
        
        .divider {
            border: none;
            border-top: 2px solid #C9A227;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <!-- 顶部党旗 + 标题 -->
    <div class="header">
        <img src="https://i.postimg.cc/XN21vFrG/1781987136946.jpg" alt="党旗" class="flag">
        <div class="title">中国国民党海口一中党部</div>
        <div class="subtitle">中国国民党海口一中党部官方网站</div>
    </div>

    <!-- 导航栏 -->
    <nav>
        <a href="#">首页</a>
        <a href="#">党部简介</a>
        <a href="#">组织架构</a>
        <a href="#">公告</a>
        <a href="#">联系我们</a>
    </nav>

    <div class="main">
        <div class="welcome">
            欢迎来到中国国民党海口一中党部官方网站。<br><br>
            本党部由海口一中青年同志组成，<br>
            秉持三民主义精神，<br>
            致力于组织交流、理论学习和公共讨论。
        </div>

        <h2>【了解党部】</h2>
        <p>中国国民党海口一中党部（简称“一中国民党”）是海口一中校园内的青年组织，推广自由民主思想，反对中国共产党。</p>
        <p>我们坚持一个中国原则，传承国民党革命精神，坚决反对左派社会主义思想。</p>

        <hr class="divider">

        <h2>最新公告</h2>
        <div class="announcement">
            <p>● 官方网站正式上线（2026年6月）</p>
        </div>
    </div>

    <footer>
        © 2026 中国国民党海口一中党部（一中国民党）<br>
        本网站仅供内部交流使用
    </footer>
